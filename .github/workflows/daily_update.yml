name: Daily AI Stock Update

on:
  schedule:
    # 每天 UTC 22:30 (台灣時間 06:30)
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    # 🔥 設定全域環境變數，確保所有步驟都能讀取到 Secrets
    env:
      TF_CPP_MIN_LOG_LEVEL: '3'
      CUDA_VISIBLE_DEVICES: '-1'
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 🔥 [關鍵修正] 強制升級 yfinance 到最新版，解決 Yahoo 下載錯誤
        # 加入 --no-cache-dir 確保不使用舊的快取
        pip install --upgrade --no-cache-dir yfinance
        # 安裝其他必要套件
        pip install ta pandas numpy scikit-learn tensorflow-cpu streamlit
        
        # 顯示 yfinance 版本 (方便除錯)
        pip show yfinance

    - name: Run Market Scanner & Backtests
      run: |
        # 1. 跑禿鷹策略 (更新 Tab 1 & 2 的推薦)
        python run_backtest.py || echo "run_backtest.py 執行失敗"

        # 2. 跑 AI 掃描 (更新 Tab 3 & 4 的今日推薦清單)
        python ai_market_scanner.py || echo "ai_market_scanner.py 執行失敗"
        
        # ⛔️ [已移除] 不再每天跑歷史回測，讓過去的回測數據固定不變！
        # python ai_backtest_2.py 
        # python ai_backtest_ma30_2.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/
        git commit -m "🤖 Auto-update daily stock data" || exit 0
        git push